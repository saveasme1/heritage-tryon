<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>헤리티지 · 착용해보기</title>
  <base href="./" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="./public/studio.css?v=20260724-tryon15" />
</head>
<body class="studio-body">
  <div class="studio-shell">
    <header class="studio-header">
      <button type="button" id="closeStudio" class="icon-btn">닫기</button>
      <div class="header-copy">
        <p class="eyebrow">착용해보기</p>
        <h1 id="productTitle">제품</h1>
      </div>
      <span id="productCat" class="chip is-hidden"></span>
    </header>

    <main id="studioStage" class="studio-stage mode-split">
      <section id="panelProduct" class="panel panel-product">
        <div class="panel-head"><h2>선택 제품</h2></div>
        <div class="panel-frame">
          <img id="productImage" class="is-hidden" alt="" decoding="async" />
          <div id="productSkeleton" class="skeleton" aria-hidden="true"></div>
        </div>
      </section>

      <section id="panelCapture" class="panel panel-capture">
        <div class="panel-head">
          <h2>내 사진</h2>
          <span id="wearTypeChip" class="wear-chip">자동</span>
        </div>
        <div class="panel-frame capture-frame" id="captureFrame">
          <img id="bodyPreview" class="is-hidden" alt="" />
          <div id="captureEmpty" class="empty-state">
            <strong>사진 준비</strong>
            <span>촬영을 누르면 제품에 맞는 가이드 카메라가 열립니다.</span>
          </div>
        </div>
        <div class="capture-toolbar">
          <button type="button" id="openCamera" class="btn btn-accent">촬영</button>
          <label class="btn btn-ghost file-btn">업로드
            <input id="fileInput" type="file" accept="image/*" hidden />
          </label>
        </div>
      </section>

      <section id="panelResult" class="panel panel-result is-hidden">
        <div class="panel-head"><h2>착용 미리보기</h2></div>
        <div class="panel-frame result-frame"><canvas id="resultCanvas"></canvas></div>
        <div class="result-toolbar">
          <button type="button" id="downloadBtn" class="btn btn-accent">저장</button>
          <button type="button" id="resetBtn" class="btn">초기화</button>
        </div>
      </section>
    </main>

    <footer class="studio-footer">
      <p id="status" class="status" role="status">제품 이미지를 불러오는 중…</p>
      <button type="button" id="mergeTryOn" class="cta" disabled>착용해보기</button>
    </footer>
  </div>

  <div id="cameraSheet" class="camera-sheet is-hidden" hidden>
    <div class="camera-top">
      <button type="button" id="closeCamera" class="icon-btn camera-close">닫기</button>
      <p id="cameraHint" class="camera-hint">가이드에 맞춰 주세요</p>
    </div>
    <div id="earSideBar" class="ear-side-bar is-hidden" hidden>
      <button type="button" class="ear-side-btn is-active" data-ear="right">오른쪽 귀</button>
      <button type="button" class="ear-side-btn" data-ear="left">왼쪽 귀</button>
    </div>
    <div class="camera-stage">
      <video id="cameraVideo" class="camera-video" playsinline muted autoplay></video>
      <canvas id="cameraSnap" class="is-hidden"></canvas>
      <div id="cameraGuide" class="camera-guide" data-type="bracelet" data-ear="right" aria-hidden="true">
        <svg viewBox="0 0 300 480" preserveAspectRatio="xMidYMid meet">
          <rect class="guide-dim" width="300" height="480" />

          <!-- 팔찌: 손(위) → 손목(+) → 팔뚝(아래) -->
          <g class="guide-outline" data-for="bracelet">
            <path class="guide-arm" d="M100 48c10-26 48-40 78-22 24 14 34 42 28 68l-8 34c40 12 60 46 54 84l-20 168c-4 30-30 52-60 52s-56-22-60-52l-20-168c-6-38 14-72 54-84l-8-34c-6-26 4-52 22-66z" />
            <ellipse class="guide-bracelet" cx="150" cy="168" rx="60" ry="25" />
            <ellipse class="guide-bracelet-inner" cx="150" cy="168" rx="40" ry="15" />
            <g class="guide-cross" transform="translate(150 168)">
              <line x1="-16" y1="0" x2="16" y2="0" />
              <line x1="0" y1="-16" x2="0" y2="16" />
              <circle r="5" />
            </g>
            <text x="150" y="435">손↑  ·  +손목  ·  팔뚝↓</text>
          </g>

          <!-- 반지: 손바닥 아래, 손가락 위, 검지(+) -->
          <g class="guide-outline" data-for="ring">
            <path class="guide-arm" d="M110 400c-18-8-32-36-26-64l20-140c6-22 24-36 46-34 40 4 66 34 60 72l-16 140c-4 28-28 46-50 46s-38-14-34-40z" />
            <path class="guide-fingers" d="M138 160v-78m16 78v-88m16 88v-78m16 78v-68" />
            <circle class="guide-point" cx="170" cy="72" r="17" />
            <g class="guide-cross" transform="translate(170 72)">
              <line x1="-11" y1="0" x2="11" y2="0" />
              <line x1="0" y1="-11" x2="0" y2="11" />
            </g>
            <text x="150" y="435">손가락↑ · 검지(+)에 맞추세요</text>
          </g>

          <!-- 귀걸이 오른쪽 -->
          <g class="guide-outline" data-for="earring" data-ear-side="right">
            <ellipse class="guide-face" cx="138" cy="220" rx="78" ry="102" />
            <ellipse class="guide-point" cx="220" cy="228" rx="14" ry="22" />
            <g class="guide-cross" transform="translate(220 228)">
              <line x1="-9" y1="0" x2="9" y2="0" />
              <line x1="0" y1="-9" x2="0" y2="9" />
            </g>
            <text x="150" y="380">오른쪽 귀 + 에 맞추세요</text>
          </g>

          <!-- 귀걸이 왼쪽 -->
          <g class="guide-outline" data-for="earring" data-ear-side="left">
            <ellipse class="guide-face" cx="162" cy="220" rx="78" ry="102" />
            <ellipse class="guide-point" cx="80" cy="228" rx="14" ry="22" />
            <g class="guide-cross" transform="translate(80 228)">
              <line x1="-9" y1="0" x2="9" y2="0" />
              <line x1="0" y1="-9" x2="0" y2="9" />
            </g>
            <text x="150" y="380">왼쪽 귀 + 에 맞추세요</text>
          </g>

          <!-- 목걸이: 얼굴 위, 목+ 아래 -->
          <g class="guide-outline" data-for="necklace">
            <ellipse class="guide-face" cx="150" cy="145" rx="72" ry="86" />
            <path class="guide-arm" d="M68 220c22-10 44-14 82-14s60 4 82 14l12 100H56z" />
            <path class="guide-bracelet" d="M88 248c24 44 100 44 124 0" />
            <g class="guide-cross" transform="translate(150 285)">
              <line x1="-12" y1="0" x2="12" y2="0" />
              <line x1="0" y1="-12" x2="0" y2="12" />
              <circle r="4" />
            </g>
            <text x="150" y="410">얼굴↑ · + 에 목·쇄골</text>
          </g>
        </svg>
      </div>
    </div>
    <div class="camera-bottom">
      <button type="button" id="shutterBtn" class="shutter" aria-label="촬영"></button>
      <p class="camera-sub">위=손/얼굴 기준으로 맞춘 뒤 촬영하세요</p>
    </div>
  </div>

  <script type="module" src="./src/studio.js?v=20260724-tryon15"></script>
</body>
</html>
