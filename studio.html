<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>헤리티지 · 착용해보기</title>
  <base href="./" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="./public/studio.css?v=20260724-tryon14" />
</head>
<body class="studio-body">
  <div class="studio-shell">
    <header class="studio-header">
      <button type="button" id="closeStudio" class="icon-btn">닫기</button>
      <div class="header-copy">
        <p class="eyebrow">착용해보기</p>
        <h1 id="productTitle">제품</h1>
      </div>
      <span id="productCat" class="chip is-hidden"></span>
    </header>

    <main id="studioStage" class="studio-stage mode-split">
      <section id="panelProduct" class="panel panel-product">
        <div class="panel-head"><h2>선택 제품</h2></div>
        <div class="panel-frame">
          <img id="productImage" class="is-hidden" alt="" decoding="async" />
          <div id="productSkeleton" class="skeleton" aria-hidden="true"></div>
        </div>
      </section>

      <section id="panelCapture" class="panel panel-capture">
        <div class="panel-head"><h2>내 사진</h2></div>
        <div class="panel-frame capture-frame" id="captureFrame">
          <img id="bodyPreview" class="is-hidden" alt="" />
          <div id="captureEmpty" class="empty-state">
            <strong>사진 준비</strong>
            <span>촬영을 누르면 가이드가 있는 카메라가 열립니다.</span>
          </div>
        </div>
        <div class="capture-toolbar">
          <button type="button" id="openCamera" class="btn btn-accent">촬영</button>
          <label class="btn btn-ghost file-btn">업로드
            <input id="fileInput" type="file" accept="image/*" hidden />
          </label>
        </div>
      </section>

      <section id="panelResult" class="panel panel-result is-hidden">
        <div class="panel-head"><h2>착용 미리보기</h2></div>
        <div class="panel-frame result-frame"><canvas id="resultCanvas"></canvas></div>
        <div class="result-toolbar">
          <button type="button" id="downloadBtn" class="btn btn-accent">저장</button>
          <button type="button" id="resetBtn" class="btn">초기화</button>
        </div>
      </section>
    </main>

    <footer class="studio-footer">
      <p id="status" class="status" role="status">제품 이미지를 불러오는 중…</p>
      <button type="button" id="mergeTryOn" class="cta" disabled>착용해보기</button>
    </footer>
  </div>

  <!-- Bank/KYC style guided camera (not part buttons) -->
  <div id="cameraSheet" class="camera-sheet is-hidden" hidden>
    <div class="camera-top">
      <button type="button" id="closeCamera" class="icon-btn camera-close">닫기</button>
      <p id="cameraHint" class="camera-hint">가이드에 맞춰 주세요</p>
    </div>
    <div class="camera-stage">
      <video id="cameraVideo" class="camera-video" playsinline muted autoplay></video>
      <canvas id="cameraSnap" class="is-hidden"></canvas>
      <div id="cameraGuide" class="camera-guide" data-type="bracelet" aria-hidden="true">
        <svg viewBox="0 0 300 480" preserveAspectRatio="xMidYMid meet">
          <rect class="guide-dim" width="300" height="480" />
          <!-- 팔찌: 팔 폭 실루엣 + 팔찌 링 + 손목 포인트 -->
          <g class="guide-outline" data-for="bracelet">
            <path class="guide-arm" d="M118 40c22-10 48-8 62 12 10 14 12 34 8 52l-28 250c-3 22-18 36-36 36s-34-14-37-36L64 104c-5-20 0-42 14-54 10-8 24-12 40-10z" />
            <ellipse class="guide-bracelet" cx="128" cy="292" rx="52" ry="22" transform="rotate(-22 128 292)" />
            <ellipse class="guide-bracelet-inner" cx="128" cy="292" rx="34" ry="12" transform="rotate(-22 128 292)" />
            <g class="guide-cross" transform="translate(128 292)">
              <line x1="-14" y1="0" x2="14" y2="0" />
              <line x1="0" y1="-14" x2="0" y2="14" />
              <circle r="5" />
            </g>
            <text x="150" y="420">팔 폭에 맞추고 + 에 손목을 두세요</text>
          </g>
          <g class="guide-outline" data-for="ring">
            <path class="guide-arm" d="M90 70c28-24 72-20 88 14 10 20 6 44-6 62L140 360c-8 28-44 28-52 0L70 150c-10-18-6-44 10-60 8-8 16-12 10-20z" />
            <circle class="guide-point" cx="176" cy="210" r="18" />
            <g class="guide-cross" transform="translate(176 210)">
              <line x1="-10" y1="0" x2="10" y2="0" />
              <line x1="0" y1="-10" x2="0" y2="10" />
            </g>
            <text x="150" y="420">손 실루엣 · 원에 반지 손가락</text>
          </g>
          <g class="guide-outline" data-for="earring">
            <ellipse class="guide-face" cx="150" cy="220" rx="86" ry="108" />
            <ellipse class="guide-point" cx="214" cy="228" rx="12" ry="20" />
            <g class="guide-cross" transform="translate(214 228)">
              <line x1="-8" y1="0" x2="8" y2="0" />
              <line x1="0" y1="-8" x2="0" y2="8" />
            </g>
            <text x="150" y="380">얼굴 프레임 · + 에 귀를 맞추세요</text>
          </g>
          <g class="guide-outline" data-for="necklace">
            <path class="guide-arm" d="M78 40c20-18 50-20 72-4 14 10 22 28 20 46l-8 28c34 12 58 42 64 78H74c6-36 30-66 64-78l-8-28c-2-16 4-34 14-42z" />
            <path class="guide-bracelet" d="M78 210c28 48 116 48 144 0" />
            <g class="guide-cross" transform="translate(150 248)">
              <line x1="-12" y1="0" x2="12" y2="0" />
              <line x1="0" y1="-12" x2="0" y2="12" />
              <circle r="4" />
            </g>
            <text x="150" y="380">상체 가이드 · + 에 목 중앙</text>
          </g>
        </svg>
      </div>
    </div>
    <div class="camera-bottom">
      <button type="button" id="shutterBtn" class="shutter" aria-label="촬영"></button>
      <p class="camera-sub">은행 인증처럼 가이드에 맞춘 뒤 버튼을 누르세요</p>
    </div>
  </div>

  <script type="module" src="./src/studio.js?v=20260724-tryon14"></script>
</body>
</html>
